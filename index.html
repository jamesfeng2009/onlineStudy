<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate" type="application/rss+xml" title="LangOria Blog" href="/rss.xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LangOria — Learn languages with spaced repetition</title>

    <!--
      SEO webmaster verification meta tags.
      Vite replaces %VITE_xxx% at build time with values from .env.
      Until you fill the env vars below, the content stays as the literal
      placeholder string and Google/Bing simply ignore the tag — no error.

      To enable:
        1. Google Search Console → Add property → lang-oria.com →
           "HTML tag" verification → copy the content value into
           VITE_GOOGLE_SITE_VERIFICATION in Vercel env vars.
        2. Bing Webmaster Tools → Add site → "HTML meta tag" verification →
           copy the content value into VITE_BING_SITE_VERIFICATION.
        3. Redeploy on Vercel.
    -->
    <meta name="google-site-verification" content="%VITE_GOOGLE_SITE_VERIFICATION%" />
    <meta name="msvalidate.01" content="%VITE_BING_SITE_VERIFICATION%" />

    <!--
      Cloudflare Web Analytics — privacy-friendly, cookie-free, free.
      Vite replaces %VITE_CF_WEB_ANALYTICS_TOKEN% at build time.

      To enable:
        1. Cloudflare dashboard → lang-oria.com →
           Analytics & Logs → Web Analytics → Enable.
        2. Copy the "tag ID" (a short hex string) into
           VITE_CF_WEB_ANALYTICS_TOKEN in Vercel env vars.
        3. Redeploy on Vercel.
    -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
            data-cf-beacon='{"token": "%VITE_CF_WEB_ANALYTICS_TOKEN%"}'></script>

    <!--
      Pre-render hreflang / canonical / og:meta before React boots.
      Vite serves this as-is; SPA hydration later replaces these via the
      data-seo="1" sentinel inside the React <Seo /> component.

      NOTE: scripts/prerender.ts strips this inline script from the
      prerendered route snapshots (dist/<route>/index.html) because those
      files already carry the resolved tags baked in — keeping it would
      emit duplicate canonical/hreflang links for crawlers.
    -->
    <script id="seo-inline-prerender">
      (function () {
        var SITE = "https://lang-oria.com";
        var LOCALES = ["en", "zh", "ja", "ko", "es", "fr", "de", "it", "th", "yue"];
        var OG = { en: "en_US", zh: "zh_CN", ja: "ja_JP", ko: "ko_KR", es: "es_ES", fr: "fr_FR", de: "de_DE", it: "it_IT", th: "th_TH", yue: "zh_HK" };
        var DEFAULT_LOCALE = "en";
        var LOCALE_URLS = { en: "", zh: "/zh", ja: "/ja", ko: "/ko", es: "/es", fr: "/fr", de: "/de", it: "/it", th: "/th", yue: "/yue" };

        function detectLocale(path) {
          var segs = path.split("/").filter(Boolean);
          if (segs.length > 0 && LOCALES.indexOf(segs[0]) === -1) return DEFAULT_LOCALE;
          if (LOCALES.indexOf(segs[0]) !== -1) return segs[0];
          var nav = (navigator.languages && navigator.languages[0]) || navigator.language || DEFAULT_LOCALE;
          nav = (nav.split("-")[0] || DEFAULT_LOCALE).toLowerCase();
          return LOCALES.indexOf(nav) !== -1 ? nav : DEFAULT_LOCALE;
        }

        // 1) Determine the *current* locale from URL.
        var rawPath = window.location.pathname || "/";
        var segs = rawPath.split("/").filter(Boolean);
        var isLocaleSeg = segs.length > 0 && LOCALES.indexOf(segs[0]) !== -1;
        var currentLocale = isLocaleSeg ? segs[0] : detectLocale(rawPath);

        // 2) Strip the locale segment so we can re-prefix per alternate.
        var stripped = isLocaleSeg
          ? "/" + segs.slice(1).join("/")
          : rawPath;
        if (stripped === "" || stripped === "/") stripped = "/";

        // 3) Build per-locale canonical URL.
        function localePath(loc) {
          var prefix = LOCALE_URLS[loc] || "";
          if (stripped === "/") return prefix || "/";
          return prefix + stripped;
        }

        function setMeta(key, content, attr) {
          attr = attr || "name";
          var el = document.head.querySelector('meta[' + attr + '="' + key + '"]');
          if (!el) {
            el = document.createElement("meta");
            el.setAttribute(attr, key);
            document.head.appendChild(el);
          }
          el.setAttribute("content", content);
        }

        // canonical: prefer the current locale's URL.
        var canonical = document.createElement("link");
        canonical.rel = "canonical";
        canonical.href = SITE + localePath(currentLocale);
        canonical.setAttribute("data-seo", "1");
        document.head.appendChild(canonical);

        // hreflang: one link per locale, plus x-default.
        LOCALES.forEach(function (l) {
          var link = document.createElement("link");
          link.rel = "alternate";
          link.setAttribute("hreflang", l);
          link.href = SITE + localePath(l);
          link.setAttribute("data-seo", "1");
          document.head.appendChild(link);
        });
        var xDef = document.createElement("link");
        xDef.rel = "alternate";
        xDef.setAttribute("hreflang", "x-default");
        xDef.href = SITE + localePath(DEFAULT_LOCALE);
        xDef.setAttribute("data-seo", "1");
        document.head.appendChild(xDef);

        // 4) <html lang> + og:locale for the current URL.
        document.documentElement.lang = currentLocale;
        setMeta("og:locale", OG[currentLocale] || OG[DEFAULT_LOCALE], "property");
        setMeta("og:site_name", "LangOria", "property");
        setMeta("og:type", "website", "property");
        setMeta("og:url", SITE + localePath(currentLocale), "property");
        setMeta("og:title", "LangOria", "property");
        setMeta("og:description", "Master languages with bite-sized lessons and spaced repetition.", "property");
        setMeta("twitter:card", "summary_large_image");
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- OAuth provider DNS prefetch: resolves github.com / accounts.google.com
         early so the OAuth redirect handshake starts faster. -->
    <link rel="dns-prefetch" href="https://github.com" />
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

name: Generate dialogue scenes

# Manually triggered: batch-generate multi-turn dialogue scenes
# for the conversation module.
#
# P4-5: ONLY Gemini languages (en/es/fr/de/it/th) run here, because
# Gemini is region-restricted in mainland China. East Asian languages
# (zh/ja/ko/yue) use Qwen via DashScope and are run LOCALLY instead —
# DashScope is China-direct, no region restriction.
#
# To generate zh/ja/ko/yue scenes, run on your local machine:
#   pnpm tsx scripts/generate-dialogue-scenes-gemini.ts --lang=zh
#
# Workflow:
#   1. Generate 6 langs × 6 scenarios = 36 scenes (or filtered subset).
#   2. Validate each scene against the 4 defenses.
#   3. Merge into src/data/dialogue-scenes.ts.
#   4. Commit + push if anything changed.

on:
  workflow_dispatch:
    inputs:
      lang:
        description: "Limit to a single language (en|es|fr|de|it|th for Gemini). For zh|ja|ko|yue run locally instead. Leave empty for all Gemini languages."
        required: false
        type: string
        default: ""
      scenario:
        description: "Limit to a single scenario (hotel|phone-call|interview|transport|shopping-clothes|small-talk) — leave empty for all"
        required: false
        type: string
        default: ""
      overwrite:
        description: "Overwrite existing generated files (default: skip existing)"
        required: false
        type: boolean
        default: false
      provider:
        description: "Filter by provider (gemini/dashscope). Default: gemini. Set to 'dashscope' only if you've added DASHSCOPE_API_KEY secret."
        required: false
        type: string
        default: "gemini"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate scenes
        env:
          # P4-5: GitHub Actions only needs Gemini (US-based runner
          # bypasses mainland China region restriction). DashScope
          # languages are generated locally instead.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional: only required if provider input is set to 'dashscope'
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          # Expose inputs as env vars so the bash block can safely
          # test for empty values (GitHub renders ${{ inputs.x }}
          # to literal "" when empty, which breaks `[ -n "${{ x }}" ]`).
          INPUT_LANG: ${{ inputs.lang }}
          INPUT_SCENARIO: ${{ inputs.scenario }}
          INPUT_OVERWRITE: ${{ inputs.overwrite }}
          INPUT_PROVIDER: ${{ inputs.provider }}
        run: |
          ARGS="--provider=${INPUT_PROVIDER:-gemini}"
          if [ -n "$INPUT_LANG" ]; then ARGS="$ARGS --lang=$INPUT_LANG"; fi
          if [ -n "$INPUT_SCENARIO" ]; then ARGS="$ARGS --scenario=$INPUT_SCENARIO"; fi
          if [ "$INPUT_OVERWRITE" = "true" ]; then ARGS="$ARGS --overwrite=true"; fi
          pnpm tsx scripts/generate-dialogue-scenes-gemini.ts $ARGS

      - name: Validate (strict: warnings fail too)
        run: pnpm tsx scripts/validate-dialogue-scenes.ts --strict || echo "::warning::Some scenes have warnings — review before merging."

      - name: Merge into src/data/dialogue-scenes.ts
        run: pnpm tsx scripts/merge-dialogue-scenes.ts

      - name: Build to verify merge compiles
        run: pnpm build

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          # Detect any change to dialogue-scenes.ts or generated/dialogues/.
          if [ -n "$(git status --porcelain -- src/data/dialogue-scenes.ts scripts/generated/dialogues/)" ]; then
            git add src/data/dialogue-scenes.ts scripts/generated/dialogues/
            git commit -m "chore(dialogues): batch-generate via Gemini [skip ci]"
            git push origin main
          else
            echo "No changes to commit."
          fi

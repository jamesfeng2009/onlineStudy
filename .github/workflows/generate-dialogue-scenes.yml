name: Generate dialogue scenes

# Manually triggered: batch-generate multi-turn dialogue scenes
# for the conversation module.
#
# 扩展支持 14 scenarios × 多 level(每语言 4-6 个 level)。
# 9 个 Gemini 语言在 GHA 跑,4 个 DashScope 语言(zh/ja/ko/yue)本地跑。
#
# Matrix: 每语言一个独立 job + 240min timeout(Gemini 15rpm 下单语言 84 批约 120min)。
# 生成产物通过 artifact 汇总,最终由单独的 merge job 统一合并、编译、提交。
# 这样避免 9 个 job 并发 push 到同一个 dialogue-scenes.ts 造成冲突。
#
# 也可手动指定 --lang / --scenario / --level 缩小范围。

on:
  workflow_dispatch:
    inputs:
      lang:
        description: "Limit to a single language (en|es|fr|de|it|th|vi|ms|id for Gemini; zh|ja|ko|yue run locally). Leave empty for matrix (en/es/fr/de/it/th/vi/ms/id)."
        required: false
        type: string
        default: ""
      scenario:
        description: "Limit to scenarios (comma-separated, e.g. 'hotel,restaurant'). Leave empty for all 14."
        required: false
        type: string
        default: ""
      level:
        description: "Limit to levels (comma-separated, e.g. 'A2,B1'). Leave empty for all levels."
        required: false
        type: string
        default: ""
      overwrite:
        description: "Overwrite existing generated files (default: skip existing)"
        required: false
        type: boolean
        default: false

jobs:
  # ── Decide: matrix or single ──
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_LANG='${{ inputs.lang }}'
          if [ -n "$INPUT_LANG" ]; then
            # 单 lang 模式
            echo "matrix={\"lang\":[\"$INPUT_LANG\"]}" >> "$GITHUB_OUTPUT"
          else
            # 9 个 Gemini 语言,每语言一个 job
            echo 'matrix={"lang":["en","es","fr","de","it","th","vi","ms","id"]}' >> "$GITHUB_OUTPUT"
          fi

  # ── 每个语言独立生成 JSON 产物 ──
  generate:
    needs: generate-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate scenes for ${{ matrix.lang }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          INPUT_SCENARIO: ${{ inputs.scenario }}
          INPUT_LEVEL: ${{ inputs.level }}
          INPUT_OVERWRITE: ${{ inputs.overwrite }}
        run: |
          ARGS="--provider=gemini --lang=${{ matrix.lang }}"
          if [ -n "$INPUT_SCENARIO" ]; then ARGS="$ARGS --scenario=$INPUT_SCENARIO"; fi
          if [ -n "$INPUT_LEVEL" ]; then ARGS="$ARGS --level=$INPUT_LEVEL"; fi
          if [ "$INPUT_OVERWRITE" = "true" ]; then ARGS="$ARGS --overwrite=true"; fi
          pnpm tsx scripts/generate-dialogue-scenes-gemini.ts $ARGS

      - name: Upload generated dialogues artifact
        uses: actions/upload-artifact@v4
        with:
          name: dialogues-${{ matrix.lang }}
          path: scripts/generated/dialogues/
          if-no-files-found: ignore
          retention-days: 1

  # ── 汇总所有产物,统一合并/编译/提交 ──
  merge-and-push:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download all dialogue artifacts
        uses: actions/download-artifact@v4
        with:
          path: scripts/generated/dialogues/
          pattern: dialogues-*
          merge-multiple: true

      - name: "Validate scenes (informational — merge will skip invalid ones)"
        # validate is informational only. The real gatekeeper is the
        # merge step below, which runs validateScene() per scene and
        # skips anything that fails. This keeps the workflow green
        # even when a few LLM outputs can't be repaired.
        run: pnpm tsx scripts/validate-dialogue-scenes.ts || echo "::warning::validate reported errors — merge will skip those scenes."

      - name: Merge into src/data/dialogue-scenes.ts
        run: pnpm tsx scripts/merge-dialogue-scenes.ts

      - name: Build to verify merge compiles
        run: pnpm build

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || true
            if [ -n "$(git status --porcelain -- src/data/dialogue-scenes.ts scripts/generated/dialogues/)" ]; then
              git add src/data/dialogue-scenes.ts scripts/generated/dialogues/
              git commit -m "chore(dialogues): batch-generate via Gemini [skip ci]" || true
              if git push origin main; then
                echo "Push succeeded."
                exit 0
              fi
              echo "Push failed, retrying in $((i * 30))s..."
              sleep $((i * 30))
            else
              echo "No changes to commit."
              exit 0
            fi
          done
          echo "ERROR: Failed to push after 5 retries"
          exit 1

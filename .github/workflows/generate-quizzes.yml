# Generate LLM quiz batches on GitHub's US-based runners,
# bypassing Gemini's "User location is not supported" block.
#
# Trigger manually from the Actions tab, or it runs weekly.
name: Generate Quizzes

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Questions per batch (5-50)"
        default: "20"
        required: false
      max_cost:
        description: "Cost cap in USD"
        default: "1.00"
        required: false
      overwrite:
        description: "Overwrite existing files? (true/false)"
        default: "false"
        required: false
      provider:
        description: "Provider filter (gemini=dashscope langs skip, dashscope=gemini langs skip, empty=all)"
        default: "gemini"
        required: false
        type: choice
        options:
          - gemini
          - dashscope
          - all

  schedule:
    # Every Monday 02:00 UTC
    - cron: "0 2 * * 1"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate quiz batches
        env:
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          # Gemini free tier: cost is $0, so set cost rates to 0 to
          # avoid the script's cost cap aborting after batch 1.
          LLM_COST_PER_1M_IN: "0"
          LLM_COST_PER_1M_OUT: "0"
          # Optional: let DashScope languages (zh/ja/ko/yue) run on the
          # GH runner too if you wire DASHSCOPE_API_KEY into Actions secrets.
          # Default behaviour: --provider=gemini skips them so they run
          # locally instead. Override via workflow_dispatch inputs.
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          ARGS="--count=${{ inputs.count || '20' }} --max-cost=${{ inputs.max_cost || '1.00' }}"
          if [ "${{ inputs.provider || 'gemini' }}" != "all" ]; then
            ARGS="$ARGS --provider=${{ inputs.provider || 'gemini' }}"
          fi
          if [ "${{ inputs.overwrite }}" = "true" ]; then
            ARGS="$ARGS --overwrite"
          fi
          npx tsx scripts/generate-quizzes-gemini.ts $ARGS

      - name: Validate generated quizzes
        continue-on-error: true
        run: npx tsx scripts/validate-quizzes.ts

      - name: Commit generated quizzes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Check if there are changes to commit (unstaged tracked OR untracked new files).
          if git diff --quiet scripts/generated/quizzes/ && ! git ls-files --others --exclude-standard scripts/generated/quizzes/ | grep -q .; then
            echo "No changes — all batches already up to date."
            exit 0
          fi
          # --autostash handles both staged and unstaged tracked changes:
          # git stashes them, rebases on the latest main, then pops them
          # back so we don't lose any regenerated files. Without this,
          # pull --rebase refuses to run with a dirty working tree.
          git pull --rebase --autostash origin main
          git add scripts/generated/quizzes/
          git commit -m "chore: auto-generate quiz batches [skip ci]"
          git push

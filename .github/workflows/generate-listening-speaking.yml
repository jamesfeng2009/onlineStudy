# Generate listening fill-in-the-blank + speaking phrases
# via Gemini on GitHub's US-based runners.
#
# P4-5: ONLY Gemini languages (en/es/fr/de/it/th) run here, because
# Gemini is region-restricted in mainland China. East Asian languages
# (zh/ja/ko/yue) use Qwen via DashScope and are run LOCALLY instead —
# DashScope is China-direct, no region restriction.
#
# To generate zh/ja/ko/yue content, run on your local machine:
#   pnpm tsx scripts/generate-listening-speaking-gemini.ts --lang=zh
#
# Trigger manually from the Actions tab to (re)generate content
# for Gemini-served languages: en, es, fr, de, it, th.
name: Generate Listening & Speaking

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Items per batch (3-20)"
        default: "5"
        required: false
      lang:
        description: "Only run for this language code. Empty = all Gemini languages (en/es/fr/de/it/th). For zh/ja/ko/yue run locally instead."
        default: ""
        required: false
      type:
        description: "Only run this type (listening/speaking). Empty = both."
        default: ""
        required: false
      overwrite:
        description: "Overwrite existing files? (true/false)"
        default: "false"
        required: false
      provider:
        description: "Filter by provider (gemini/dashscope). Default: gemini. Set to 'dashscope' only if you've added DASHSCOPE_API_KEY secret."
        default: "gemini"
        required: false

  schedule:
    # Every Monday 02:30 UTC (after the quiz workflow at 02:00)
    - cron: "30 2 * * 1"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate listening & speaking batches
        env:
          # P4-5: GitHub Actions only needs Gemini (US-based runner
          # bypasses mainland China region restriction). DashScope
          # languages are generated locally instead.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional: only required if provider input is set to 'dashscope'
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          # Cost rates set to 0 (free tier / covered by free quota)
          LLM_COST_PER_1M_IN: "0"
          LLM_COST_PER_1M_OUT: "0"
        run: |
          ARGS="--count=${{ inputs.count || '5' }}"
          ARGS="$ARGS --provider=${{ inputs.provider || 'gemini' }}"
          if [ -n "${{ inputs.lang }}" ]; then ARGS="$ARGS --lang=${{ inputs.lang }}"; fi
          if [ -n "${{ inputs.type }}" ]; then ARGS="$ARGS --type=${{ inputs.type }}"; fi
          if [ "${{ inputs.overwrite }}" = "true" ]; then ARGS="$ARGS --overwrite"; fi
          npx tsx scripts/generate-listening-speaking-gemini.ts $ARGS

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Check if there are changes to commit (unstaged tracked OR untracked new files).
          if git diff --quiet scripts/generated/listening/ scripts/generated/speaking/ \
             && ! git ls-files --others --exclude-standard scripts/generated/listening/ scripts/generated/speaking/ | grep -q .; then
            echo "No changes — content already up to date."
            exit 0
          fi
          # --autostash handles both staged and unstaged tracked changes:
          # git stashes them, rebases on the latest main, then pops them
          # back so we don't lose any regenerated files. Without this,
          # pull --rebase refuses to run with a dirty working tree.
          git pull --rebase --autostash origin main
          git add scripts/generated/listening/ scripts/generated/speaking/
          git commit -m "chore: auto-generate listening & speaking batches [skip ci]"
          git push
